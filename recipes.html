<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Atlas - All Recipes</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="recipes">
    <header class="site-header">
      <a class="brand" href="index.html">Recipe Atlas</a>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a class="active" href="recipes.html">All Recipes</a>
        <a href="add-recipe.html">Add Recipe</a>
      </nav>
    </header>

    <main class="container">
      <section class="panel">
        <div class="section-head">
          <h1>All Recipes</h1>
        </div>
        <div class="toolbar">
          <input id="searchInput" type="search" placeholder="Search title or ingredient..." />
          <select id="categoryFilter"></select>
          <select id="sortBy">
            <option value="newest">Newest</option>
            <option value="name">Name</option>
            <option value="category">Category</option>
          </select>
        </div>
        <div class="recipe-grid" id="allRecipes"></div>
      </section>
    </main>

    <script src="sync-config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
